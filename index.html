<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 11 - JavaScript Loops</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 30px;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            border: 1px solid #aaa;
            padding: 20px;
            width: 260px;
            min-height: 200px;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #000;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .field label {
            font-size: 0.8rem;
            color: #222;
            white-space: nowrap;
            min-width: 90px;
        }

        .field input {
            width: 100px;
            padding: 2px 5px;
            border: 1px solid #999;
            font-size: 0.85rem;
            outline: none;
        }

        .field input:focus { border-color: #333; }

        .buttons { display: flex; gap: 6px; margin: 10px 0; }

        .btn-show, .btn-clear {
            padding: 3px 14px;
            font-size: 0.8rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            background-color: #28a745;
        }

        .btn-show:hover, .btn-clear:hover { background-color: #218838; }

        .output {
            margin-top: 6px;
            font-size: 0.85rem;
            color: #222;
            line-height: 1.7;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- For Loop Card -->
        <div class="card">
            <h2>For Loop</h2>
            <div class="field">
                <label for="for-number">Enter number :</label>
                <input type="number" id="for-number">
            </div>
            <div class="field">
                <label for="for-text">Enter text :</label>
                <input type="text" id="for-text">
            </div>
            <div class="buttons">
                <button class="btn-show" id="for-show">Show</button>
                <button class="btn-clear" id="for-clear">Clear</button>
            </div>
            <div class="output" id="for-output"></div>
        </div>

        <!-- While Loop Card -->
        <div class="card">
            <h2>While Loop</h2>
            <div class="field">
                <label for="while-number">Enter number :</label>
                <input type="number" id="while-number">
            </div>
            <div class="field">
                <label for="while-text">Enter text :</label>
                <input type="text" id="while-text">
            </div>
            <div class="buttons">
                <button class="btn-show" id="while-show">Show</button>
                <button class="btn-clear" id="while-clear">Clear</button>
            </div>
            <div class="output" id="while-output"></div>
        </div>

        <!-- Do-While Loop Card -->
        <div class="card">
            <h2>Do-While Loop</h2>
            <div class="field">
                <label for="dowhile-number">Enter number :</label>
                <input type="number" id="dowhile-number">
            </div>
            <div class="field">
                <label for="dowhile-text">Enter text :</label>
                <input type="text" id="dowhile-text">
            </div>
            <div class="buttons">
                <button class="btn-show" id="dowhile-show">Show</button>
                <button class="btn-clear" id="dowhile-clear">Clear</button>
            </div>
            <div class="output" id="dowhile-output"></div>
        </div>

    </div>

    <script>
        // ===== FOR LOOP =====
        document.getElementById('for-show').addEventListener('click', function () {
            var num = document.getElementById('for-number').value;
            var text = document.getElementById('for-text').value;
            if (!num || !text) { alert('Please enter both a number and text.'); return; }
            var count = parseInt(num);
            if (isNaN(count) || count <= 0) { alert('Please enter a valid positive number.'); return; }
            var output = document.getElementById('for-output');
            output.innerHTML = '';
            for (var i = 1; i <= count; i++) {
                var line = document.createElement('div');
                line.textContent = i + '. ' + text;
                output.appendChild(line);
            }
        });

        document.getElementById('for-clear').addEventListener('click', function () {
            document.getElementById('for-number').value = '';
            document.getElementById('for-text').value = '';
            document.getElementById('for-output').innerHTML = '';
        });

        // ===== WHILE LOOP =====
        document.getElementById('while-show').addEventListener('click', function () {
            var num = document.getElementById('while-number').value;
            var text = document.getElementById('while-text').value;
            if (!num || !text) { alert('Please enter both a number and text.'); return; }
            var count = parseInt(num);
            if (isNaN(count) || count <= 0) { alert('Please enter a valid positive number.'); return; }
            var output = document.getElementById('while-output');
            output.innerHTML = '';
            var i = 1;
            while (i <= count) {
                var line = document.createElement('div');
                line.textContent = i + '. ' + text;
                output.appendChild(line);
                i++;
            }
        });

        document.getElementById('while-clear').addEventListener('click', function () {
            document.getElementById('while-number').value = '';
            document.getElementById('while-text').value = '';
            document.getElementById('while-output').innerHTML = '';
        });

        // ===== DO-WHILE LOOP =====
        document.getElementById('dowhile-show').addEventListener('click', function () {
            var num = document.getElementById('dowhile-number').value;
            var text = document.getElementById('dowhile-text').value;
            if (!num || !text) { alert('Please enter both a number and text.'); return; }
            var count = parseInt(num);
            if (isNaN(count) || count <= 0) { alert('Please enter a valid positive number.'); return; }
            var output = document.getElementById('dowhile-output');
            output.innerHTML = '';
            var i = 1;
            do {
                var line = document.createElement('div');
                line.textContent = i + '. ' + text;
                output.appendChild(line);
                i++;
            } while (i <= count);
        });

        document.getElementById('dowhile-clear').addEventListener('click', function () {
            document.getElementById('dowhile-number').value = '';
            document.getElementById('dowhile-text').value = '';
            document.getElementById('dowhile-output').innerHTML = '';
        });
    </script>

</body>
</html>
